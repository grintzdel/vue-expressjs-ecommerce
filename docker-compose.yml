services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/ecommerce
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRES_IN=24h

volumes:
  mongo-data:
