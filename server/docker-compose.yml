services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      - PORT=${PORT:-3001}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/ecommerce}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - CLIENT_URL=${CLIENT_URL}

volumes:
  mongo-data:
